# Fundamental infrastructure services for local backend development.
name: tradeagent-fundament

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradeagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradeagent}
      POSTGRES_USER: ${POSTGRES_USER:-tradeagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradeagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tradeagent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradeagent-fundament

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tradeagent-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-tradeagent}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-tradeagent}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - tradeagent-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradeagent-fundament

  redis:
    image: redis:7-alpine
    container_name: tradeagent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - tradeagent-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradeagent-fundament

volumes:
  tradeagent-postgres-data:
  tradeagent-rabbitmq-data:
  tradeagent-redis-data:

networks:
  tradeagent-fundament:
    name: tradeagent-fundament
